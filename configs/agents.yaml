agents:
  search_agent:
    language: "en"
    communication_format: "yaml"
    role: "Find candidate event windows in video."

  vision_agent:
    language: "en"
    communication_format: "yaml"
    role: "Run detection, tracking, pose and motion analysis."

  detective_agent:
    language: "en"
    communication_format: "yaml"
